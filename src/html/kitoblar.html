    /* Asosiy tugma stili */
.category-btn {
  position: relative;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 40px;
  background-color: #1a56db; /* $primary-blue */
  color: white;
  border: none;
  border-radius: 10px;
  font-family: 'Inter', sans-serif;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
  overflow: hidden;
  z-index: 1;
}

/* Matn va ikonka doim ustda turishi uchun */
.category-btn .menu-icon, 
.category-btn .btn-text {
  position: relative;
  z-index: 3;
}

/* Hoverdagi rangli blok (orqa fonda) */
.category-btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%; /* Dastlab chapda yashirin */
  width: 100%;
  height: 100%;
  background-color: #0d3eb3; /* $hover-blue */
  z-index: 2;
}

/* HOVER bo'lganda animatsiya ishga tushadi */
.category-btn:hover::before {
  animation: bounceRight 0.8s both;
}

/* O'NGGA URILIB SAKRASH ANIMATSIYASI */
@keyframes bounceRight {
  0% { left: -100%; }
  30% { left: 0; }       /* Birinchi bor o'ngga kelib urildi */
  50% { left: -10%; }    /* Orqaga sakradi */
  70% { left: 0; }       /* Yana urildi */
  85% { left: -3%; }     /* Kamroq sakradi */
  100% { left: 0; }      /* To'xtadi */
}

/* Burger ikonkasining asosiy qutisi */
.category-btn .menu-icon {
  width: 22px;
  height: 16px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* Burger chiziqlari */
.category-btn .menu-icon span {
  display: block;
  height: 2px;
  width: 100%;
  background: white;
  transition: all 0.3s ease;
}

/* Active klassi qo'shilganda Burgerdan "X" ga aylanish */
.category-btn.active .menu-icon span:nth-child(1) {
  transform: translateY(7px) rotate(45deg);
}
.category-btn.active .menu-icon span:nth-child(2) {
  opacity: 0;
}
.category-btn.active .menu-icon span:nth-child(3) {
  transform: translateY(-7px) rotate(-45deg);
}

    // ====================== KARTALARNI CHIQARISH ======================
    function renderBooks() {
      const grid = document.getElementById('books-grid');
      if (!grid) return;
      grid.innerHTML = '';

      books.forEach(book => {
  const card = document.createElement('div');
  card.className = 'product-card';
  card.innerHTML = `
    <div class="discount-badge">${book.discount}</div>
    <div class="icons">
      <button class="heart-btn" data-id="${book.id}"><i class="ri-heart-3-line"></i></button>
      <button class="compare-btn" data-id="${book.id}"><i class="ri-scales-line"></i></button>
    </div>
    <img src="../../${book.image}" alt="${book.title}"
         onclick="goToPage('./obzor.html?id=${book.id}')"
         style="cursor:pointer;">
    <div class="name"
         onclick="goToPage('./obzor.html?id=${book.id}')"
         style="cursor:pointer;">${book.title}</div>
    <div class="reviews">${book.author}</div>
    <div class="rating">${book.rating}</div>
    <div class="reviews">${book.reviews}</div>
    <div class="price">${book.price}</div>
    <div class="installment">${book.installment}</div>
    <div class="buttons">
      <button class="buy-btn"><span class="btn-text">Купить</span></button>
      <button class="cart-btn"><i class="ri-shopping-cart-2-line"></i></button>
    </div>
  `;
  grid.appendChild(card);
});

      addBookListeners();
      restoreBookIcons();
      updateCounts();
    }

    // ====================== TUGMA LISTENERLAR ======================
    function addBookListeners() {
      document.querySelectorAll('.heart-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopImmediatePropagation();
          const id = parseInt(btn.dataset.id);
          addToStorage('favorites', id, btn);
        });
      });

      document.querySelectorAll('.compare-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopImmediatePropagation();
          const id = parseInt(btn.dataset.id);
          addToStorage('compare', id, btn);
        });
      });

      document.querySelectorAll('.cart-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopImmediatePropagation();
          const id = parseInt(btn.closest('.product-card').querySelector('.heart-btn').dataset.id);
          addToStorage('cart', id);
        });
      });
    }

    // ====================== IKONLARNI TIKLASH ======================
    function restoreBookIcons() {
      const favorites = JSON.parse(localStorage.getItem('favorites')) || [];
      const compares  = JSON.parse(localStorage.getItem('compare'))   || [];

      document.querySelectorAll('.heart-btn').forEach(btn => {
        const id   = parseInt(btn.dataset.id);
        const icon = btn.querySelector('i');
        if (favorites.includes(id)) {
          icon.classList.replace('ri-heart-3-line', 'ri-heart-3-fill');
          icon.style.color = '#ef4444';
        } else {
          icon.classList.replace('ri-heart-3-fill', 'ri-heart-3-line');
          icon.style.color = '';
        }
      });

      document.querySelectorAll('.compare-btn').forEach(btn => {
        const id   = parseInt(btn.dataset.id);
        const icon = btn.querySelector('i');
        if (compares.includes(id)) {
          icon.classList.replace('ri-scales-line', 'ri-scales-fill');
          icon.style.color = '#1a56db';
        } else {
          icon.classList.replace('ri-scales-fill', 'ri-scales-line');
          icon.style.color = '';
        }
      });
    }

    // ====================== SAHIFA YUKLANGANDA ======================
    window.addEventListener('load', () => {
      renderBooks();
    });
