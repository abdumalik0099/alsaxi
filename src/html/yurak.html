<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css">
</head>
<body>
  <header>
    <nav class="nav">
      <div class="asosiy nav-sticky container">
        <div class="iconNav">
          <img onclick="goToPage('../../index.html')" src="../assets/svg/asaxiy-logo.svg" alt="" style="cursor: pointer;">
        </div>
        <div class="btn_nav">
          <button class="category-btn category-main-btn">
            <div class="menu-icon">
              <span></span><span></span><span></span>
            </div>
            <span class="btn-text">Категории</span>
          </button>
        </div>
        <div class="inputNav">
          <input class="navSearch" type="text" placeholder="поиск..." />
          <button class="search">Искать</button>
        </div>
        <div class="nav_ikons">
          <div onclick="goToPage('./taqqoslash.html')">
            <i class="ri-scales-fill"><h5 id="taqqoslash">0</h5></i>
            <div>Сравнение</div>
          </div>
          <div><i class="ri-bank-card-line"></i><div>Оплатить</div></div>
          <div><i class="ri-truck-line"></i><div>Отследить</div></div>
          <div onclick="goToPage('./savat.html')">
            <i class="ri-shopping-cart-2-line"><h5 id="shop">0</h5></i>
            <div>Корзина</div>
          </div>
          <div onclick="goToPage('./yurak.html')">
            <i class="ri-poker-hearts-line"><h5 id="yurak">0</h5></i>
            <div>Избранное</div>
          </div>
          <div><i class="ri-global-line"></i><div>O'zbekcha</div></div>
          <div id="loginTrigger"><i class="ri-user-add-line"></i><div>Войти</div></div>
        </div>
      </div>
      <hr />
      <div class="bottom_nav">
        <div class="container flex">
          <div class="superNarx"><h3>Супер цена</h3></div>
          <div class="bilmadim"><h3>0-0-6</h3></div>
          <div class="havo"><h3>Воздухоочистители</h3></div>
          <div class="telefon"><h3>Смартфоны</h3></div>
          <div class="maoshiyTexnika"><h3>Бытовая техника</h3></div>
          <div class="kitoblar"><h3>Книги</h3></div>
          <div class="televizor"><h3>Телевизоры</h3></div>
          <div class="noutbuk"><h3>Ноутбуки</h3></div>
        </div>
      </div>
    </nav>
  </header>

  <!-- ===== SARLAVHA ===== -->
  <div class="container" style="margin-top:32px; margin-bottom:8px;">
    <h2 style="font-size:22px; font-weight:700; color:#111;">
      <i class="ri-heart-3-fill" style="color:#ef4444; margin-right:8px;"></i>Избранное
      <span id="favCount" style="font-size:14px; color:#9ca3af; font-weight:400; margin-left:8px;"></span>
    </h2>
  </div>

  <div id="product-grid" class="product-grid container"></div>

  <script src="../js/fivetennKards.js"></script>
  <script src="../js/search.js"></script>
  <script src="../js/animation.js"></script>
  <script src="../js/script.js"></script>
  <script src="../js/search.js"></script>

  <script>
    function renderFavorites() {
      const savedIds = JSON.parse(localStorage.getItem('favorites')) || [];
      const grid     = document.getElementById('product-grid');
      const countEl  = document.getElementById('favCount');
      grid.innerHTML = '';

      if (countEl) countEl.textContent = savedIds.length ? `(${savedIds.length} ta)` : '';

      // ===== BO'SH =====
      if (savedIds.length === 0) {
        grid.style.display        = 'flex';
        grid.style.justifyContent = 'center';
        grid.style.alignItems     = 'center';
        grid.style.minHeight      = '60vh';
        grid.innerHTML = `
          <div style="text-align:center; padding:40px 20px;">
            <i class="ri-heart-3-line" style="font-size:72px; color:#e5e7eb;"></i>
            <h3 style="margin-top:16px; color:#9ca3af; font-size:18px; font-weight:600;">Избранное bo'sh</h3>
            <p style="color:#c4c4c4; font-size:14px; margin-top:8px;">Mahsulot kartasidagi ❤️ tugmasini bosing</p>
          </div>
        `;
        return;
      }

      // ===== KARTALAR =====
      grid.style.display   = 'grid';
      grid.style.minHeight = 'auto';

      savedIds.forEach(id => {
        const item = products.find(p => p.id === id);
        if (!item) return;

        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <div class="discount-badge">${item.discount}</div>

          <div class="icons">
            <button class="heart-btn" data-id="${item.id}">
              <i class="ri-heart-3-line"></i>
            </button>
            <button class="compare-btn" data-id="${item.id}">
              <i class="ri-scales-line"></i>
            </button>
          </div>

          <img src="${item.image}" alt="${item.title}"
               onclick="goToObzor(${item.id})" style="cursor:pointer;">

          <div class="name" onclick="goToObzor(${item.id})">${item.title}</div>
          <div class="rating">${item.rating}</div>
          <div class="reviews">${item.reviews}</div>
          <div class="price">${item.price}</div>
          <div class="installment">${item.installment}</div>

          <div class="buttons">
            <button class="buy-btn"><span class="btn-text">Sotib olish</span></button>
            <button class="cart-btn" data-id="${item.id}">
              <i class="ri-shopping-cart-2-line"></i>
            </button>
          </div>
        `;
        grid.appendChild(card);
      });

      // ❤️ bosilganda sahifadan o'chirish
      document.querySelectorAll('.heart-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopImmediatePropagation();
          const id = parseInt(btn.dataset.id);
          let items = JSON.parse(localStorage.getItem('favorites')) || [];
          items = items.filter(i => i !== id);
          localStorage.setItem('favorites', JSON.stringify(items));
          renderFavorites();
          updateCounts();
        });
      });

      addListeners();
      restoreIconStates();
      updateCounts();

      if (typeof addCartListeners === 'function') addCartListeners();
    }

    function goToObzor(id) {
      window.location.href = './obzor.html?id=' + id;
    }

    window.addEventListener('load', () => {
      renderFavorites();
    });
  </script>
</body>
</html>
