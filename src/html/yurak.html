      /* Badge-ni burchakka taqash */
.product-card {
    position: relative; /* Badge uchun asos */
    background-color: #fff;
    padding: 20px;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    justify-content: space-between; /* Elementlarni vertikal tekislash */
}

.discount-badge {
    position: absolute; /* Karta burchagiga mustaqil joylashadi */
    top: 10px;
    left: 10px;
    background-color: rgb(184, 62, 62);
    color: #fff;
    padding: 5px 10px;
    border-radius: 8px;
    z-index: 2; /* Rasm tagida qolmasligi uchun */
    font-size: 12px;
}

/* Rasmni markazga keltirish */
.product-card img {
    width: 100%;
    max-width: 150px;
    height: auto;
    margin: 0 auto 15px auto; /* Markazlash va pastdan bo'shliq */
    display: block;
}

/* Tugmani pastga tekislash va kengaytirish */
.remove-btn {
    width: 100%;
    display: block;
    text-align: center;
    transition: 0.3s;
}

.remove-btn:hover {
    background-color: #dc2626 !important;
    transform: scale(0.98);
}

/* Narx va tekstlarni chiroyli qilish */
.price {
    font-weight: bold;
    font-size: 18px;
    color: #1a56db;
    margin-top: auto; /* Narxni tugmadan tepaga suradi */
}
.block {
    display: flex;
    flex-direction: column; /* Matn va rasmni ustma-ust qo'yadi */
    align-items: center;    /* Ichidagi elementlarni (rasm/tekst) markazga oladi */
    justify-content: center; /* Vertikal markazlash */
    
    width: 100%;            /* Butun kenglikni egallashi shart */
    min-height: 70vh;       /* Sahifaning 70% balandligini egallaydi, shunda markazda ko'rinadi */
    text-align: center;
    
    /* Agar tepadan navbar xalaqit bersa: */
    margin: 0 auto; 
}

.block .image {
    width: 300px;           /* Rasmni biroz kattalashtirdik */
    height: auto;
    display: block;
    margin-top: 20px;       /* Matndan keyin masofa */
}

.block p {
    font-size: 20px;
    color: #4b5563;
    font-weight: 500;
}

  <script>
function renderFavorites() {
  const savedIds = JSON.parse(localStorage.getItem('favorites')) || [];
  const grid = document.getElementById("product-grid");
  grid.innerHTML = "";

  if (savedIds.length === 0) {
    // MUHIM: Grid xususiyatini bekor qilamiz, shunda .block butun kenglikni oladi
    grid.style.display = "block"; 
    
    grid.innerHTML = `
    <div class="block">
        <p>Like bosilmagan</p>    
        <img class="image" src="../../src/assets/img/nocard.webp" alt="">
    </div>  
    `;
    return;
  }

  // Agar mahsulot bo'lsa, Grid rejimini qaytaramiz
  grid.style.display = "grid"; 

  savedIds.forEach(id => {
    const item = products.find(p => p.id === id);
    if (!item) return;

    const card = document.createElement("div");
    card.className = "product-card";

    card.innerHTML = `
      <div class="discount-badge">${item.discount}</div>
      <img src="${item.image}" alt="${item.title}">
      <div class="name">${item.title}</div>
      <div class="rating">${item.rating}</div>
      <div class="reviews">${item.reviews}</div>
      <div class="price">${item.price}</div>
      <div class="installment">${item.installment}</div>
      
      <button class="remove-btn" data-id="${id}" style="margin-top:15px; background:#ef4444; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer;">
        Olib tashlash
      </button>
    `;

    grid.appendChild(card);
  });

  // Olib tashlash tugmalari logikasi...
  document.querySelectorAll('.remove-btn').forEach(btn => {
    btn.onclick = () => { // addEventListener o'rniga qisqaroq
      const id = parseInt(btn.dataset.id);
      let items = JSON.parse(localStorage.getItem('favorites')) || [];
      items = items.filter(i => i !== id);
      localStorage.setItem('favorites', JSON.stringify(items));
      renderFavorites();
      updateCounts();
    };
  });
}
    window.addEventListener('load', renderFavorites);
  </script>
