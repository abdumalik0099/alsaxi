      /* Badge-ni burchakka taqash */
.product-card {
    position: relative; /* Badge uchun asos */
    background-color: #fff;
    padding: 20px;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    justify-content: space-between; /* Elementlarni vertikal tekislash */
}

.discount-badge {
    position: absolute; /* Karta burchagiga mustaqil joylashadi */
    top: 10px;
    left: 10px;
    background-color: rgb(184, 62, 62);
    color: #fff;
    padding: 5px 10px;
    border-radius: 8px;
    z-index: 2; /* Rasm tagida qolmasligi uchun */
    font-size: 12px;
}

/* Rasmni markazga keltirish */
.product-card img {
    width: 100%;
    max-width: 150px;
    height: auto;
    margin: 0 auto 15px auto; /* Markazlash va pastdan bo'shliq */
    display: block;
}

/* Tugmani pastga tekislash va kengaytirish */
.remove-btn {
    width: 100%;
    display: block;
    text-align: center;
    transition: 0.3s;

.remove-btn:hover {

  <script src="../js/fivetennKards.js"></script>
  <script>
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

function displayCart() {
  const grid = document.getElementById("product-grid");
  grid.innerHTML = "";

  if (cart.length === 0) {
    // Gridni vaqtincha yopib, blokni markazga keltiramiz
    grid.style.display = "block"; 
    
    grid.innerHTML = `
      <div class="block">
          <p>Savatda xech narsa yo'q</p>    
          <img class="image" src="../../src/assets/img/nocard.webp" alt="Empty Cart">
      </div>  
    `;
    return;
  }

  // Mahsulot bo'lsa, Grid rejimini qaytaramiz
  grid.style.display = "grid";

  grid.innerHTML = cart.map(id => {
    const item = products.find(p => p.id === id);
    if (!item) return '';

    return `
      <div class="product-card">
        <div class="discount-badge">${item.discount}</div>
        <img src="${item.image}" alt="${item.title}">
        <div class="name">${item.title}</div>
        <div class="rating">${item.rating}</div>
        <div class="reviews">${item.reviews}</div>
        <div class="price">${item.price}</div>
        <div class="installment">${item.installment}</div>
        
        <button class="remove-btn" onclick="toggleCart(${item.id})" style="margin-top:15px; background:#ef4444; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer;">
          Olib tashlash
        </button>
      </div>
    `;
  }).join('');

  updateUI();
}
    function toggleCart(id) {
      const index = cart.findIndex(i => i === id);
      if (index > -1) {
        cart.splice(index, 1);
      } else {
        cart.push(id);
      }
      localStorage.setItem('cart', JSON.stringify(cart));
      displayCart();
    }

    function updateUI() {
      // Navbardagi sonni yangilash (agar navbar shu sahifada bo‘lsa)
      const shop = document.getElementById('shop');
      if (shop) shop.textContent = cart.length;
    }

    window.addEventListener('load', displayCart);
  </script>
