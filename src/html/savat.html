<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Корзина</title>
  <link rel="stylesheet" href="../dist/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0efeb; font-family: 'Segoe UI', sans-serif; color: #111; }

    .cart-page {
      max-width: 1400px;
      margin: 32px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
      align-items: start;
    }

    /* ===== CHAP: MAHSULOTLAR ===== */
    .cart-left {}

    /* Yuqori panel */
    .cart-top-bar {
      background: #fff;
      border-radius: 14px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .cart-select-all {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: #111;
      user-select: none;
    }

    /* Custom checkbox */
    .cart-checkbox {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 2px solid #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      cursor: pointer;
    }
    .cart-checkbox.checked {
      background: #7c3aed;
      border-color: #7c3aed;
    }
    .cart-checkbox.checked::after {
      content: '';
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
      display: block;
    }

    .cart-delete-all {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #9ca3af;
      cursor: pointer;
      background: none;
      border: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .cart-delete-all:hover { color: #ef4444; }
    .cart-delete-all i { font-size: 16px; }

    /* Mahsulot qatori */
    .cart-item {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 10px;
      transition: box-shadow 0.2s;
    }
    .cart-item:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }

    .cart-item__check { flex-shrink: 0; }

    .cart-item__img {
      width: 90px;
      height: 90px;
      object-fit: contain;
      border-radius: 10px;
      background: #f9fafb;
      padding: 6px;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    .cart-item__img:hover { transform: scale(1.05); }

    .cart-item__info {
      flex: 1;
      min-width: 0;
    }

    .cart-item__brand {
      display: inline-block;
      background: #1a56db;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 6px;
      margin-bottom: 6px;
    }

    .cart-item__name {
      font-size: 14px;
      font-weight: 500;
      color: #111;
      line-height: 1.4;
      margin-bottom: 10px;
      cursor: pointer;
      transition: color 0.15s;
    }
    .cart-item__name:hover { color: #1a56db; }

    .cart-item__actions {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .cart-item__action-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      color: #9ca3af;
      transition: color 0.2s;
    }
    .cart-item__action-btn:hover { color: #ef4444; }
    .cart-item__action-btn i { font-size: 16px; }

    .cart-item__price-block {
      text-align: right;
      flex-shrink: 0;
    }

    .cart-item__price {
      font-size: 18px;
      font-weight: 800;
      color: #111;
      margin-bottom: 6px;
    }

    .cart-item__installment {
      font-size: 12px;
      color: #fe7300;
      border: 1px solid #fe7300;
      padding: 3px 8px;
      border-radius: 6px;
      white-space: nowrap;
      margin-bottom: 12px;
      display: inline-block;
    }

    /* Miqdor */
    .cart-item__qty {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: flex-end;
    }

    .qty-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid #e5e7eb;
      background: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      color: #374151;
      line-height: 1;
    }
    .qty-btn:hover { border-color: #1a56db; color: #1a56db; }

    .qty-num {
      font-size: 15px;
      font-weight: 700;
      min-width: 20px;
      text-align: center;
    }

    /* ===== O'NG: HISOB ===== */
    .cart-right {
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      position: sticky;
      top: 20px;
    }

    .cart-summary__title {
      font-size: 15px;
      font-weight: 700;
      color: #fe7300;
      margin-bottom: 20px;
    }

    .cart-summary__row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 10px;
    }

    .cart-summary__row strong {
      color: #111;
      font-weight: 700;
    }

    .cart-summary__divider {
      border: none;
      border-top: 1px solid #f3f4f6;
      margin: 14px 0;
    }

    .cart-summary__total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 16px;
      font-weight: 800;
      color: #111;
      margin-bottom: 20px;
    }

    .cart-summary__total span:last-child {
      font-size: 20px;
    }

    .cart-order-btn {
      width: 100%;
      padding: 16px;
      background: #1a56db;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .cart-order-btn:hover { background: #0d3eb3; transform: scale(0.99); }

    /* Bo'sh holat */
    .cart-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      grid-column: 1 / -1;
    }
    .cart-empty i { font-size: 72px; color: #e5e7eb; }
    .cart-empty h3 { margin-top: 16px; color: #9ca3af; font-size: 18px; }
    .cart-empty p { color: #c4c4c4; font-size: 14px; margin-top: 8px; }

    @media (max-width: 900px) {
      .cart-page { grid-template-columns: 1fr; }
      .cart-right { position: static; }
    }
    @media (max-width: 560px) {
      .cart-item { flex-wrap: wrap; }
      .cart-item__price-block { width: 100%; text-align: left; }
    }
  </style>
</head>
<body>

  <header>
    <nav class="nav">
      <div class="asosiy nav-sticky container">
        <div class="iconNav">
          <img onclick="goToPage('../../index.html')" src="../assets/svg/asaxiy-logo.svg" alt="" style="cursor: pointer;">
        </div>
        <div class="btn_nav">
          <button class="category-btn category-main-btn">
            <div class="menu-icon"><span></span><span></span><span></span></div>
            <span class="btn-text">Категории</span>
          </button>
        </div>
        <div class="inputNav">
          <input class="navSearch" type="text" placeholder="поиск..." />
          <button class="search">Искать</button>
        </div>
        <div class="nav_ikons">
          <div onclick="goToPage('./taqqoslash.html')">
            <i class="ri-scales-fill"><h5 id="taqqoslash">0</h5></i>
            <div>Сравнение</div>
          </div>
          <div><i class="ri-bank-card-line"></i><div>Оплатить</div></div>
          <div><i class="ri-truck-line"></i><div>Отследить</div></div>
          <div onclick="goToPage('./savat.html')">
            <i class="ri-shopping-cart-2-line"><h5 id="shop">0</h5></i>
            <div>Корзина</div>
          </div>
          <div onclick="goToPage('./yurak.html')">
            <i class="ri-poker-hearts-line"><h5 id="yurak">0</h5></i>
            <div>Избранное</div>
          </div>
          <div><i class="ri-global-line"></i><div>O'zbekcha</div></div>
          <div id="loginTrigger"><i class="ri-user-add-line"></i><div>Войти</div></div>
        </div>
      </div>
      <hr />
      <div class="bottom_nav">
        <div class="container flex">
          <div class="superNarx"><h3>Супер цена</h3></div>
          <div class="bilmadim"><h3>0-0-6</h3></div>
          <div class="havo"><h3>Воздухоочистители</h3></div>
          <div class="telefon"><h3>Смартфоны</h3></div>
          <div class="maoshiyTexnika"><h3>Бытовая техника</h3></div>
          <div class="kitoblar"><h3>Книги</h3></div>
          <div class="televizor"><h3>Телевизоры</h3></div>
          <div class="noutbuk"><h3>Ноутбуки</h3></div>
        </div>
      </div>
    </nav>
  </header>

  <!-- ===== SARLAVHA ===== -->
  <div class="container" style="margin-top:32px; margin-bottom:8px;">
    <h2 style="font-size:22px; font-weight:700; color:#111;">
      <i class="ri-shopping-cart-2-line" style="color:#1a56db; margin-right:8px;"></i>Корзина
      <span id="cartCount" style="font-size:14px; color:#9ca3af; font-weight:400; margin-left:8px;"></span>
    </h2>
  </div>

  <div class="cart-page" id="cartPage"></div>

  <script src="../js/fivetennKards.js"></script>
  <script src="../js/search.js"></script>
  <script src="../js/animation.js"></script>
  <script src="../js/script.js"></script>
  <script src="../js/search.js"></script>

  <script>
    // Miqdorlar — id: son
    const quantities = {};

    function renderCart() {
      const cartIds = JSON.parse(localStorage.getItem('cart')) || [];
      const page    = document.getElementById('cartPage');
      const countEl = document.getElementById('cartCount');

      page.innerHTML = '';

      if (countEl) countEl.textContent = cartIds.length ? `(${cartIds.length} ta)` : '';

      // ===== BO'SH =====
      if (cartIds.length === 0) {
        page.style.gridTemplateColumns = '1fr';
        page.innerHTML = `
          <div class="cart-empty">
            <i class="ri-shopping-cart-2-line"></i>
            <h3>Savat bo'sh</h3>
            <p>Mahsulot kartasidagi 🛒 tugmasini bosing</p>
          </div>
        `;
        return;
      }

      page.style.gridTemplateColumns = '';

      // Miqdorlarni boshlash
      cartIds.forEach(id => {
        if (!quantities[id]) quantities[id] = 1;
      });

      // ===== CHAP =====
      const left = document.createElement('div');
      left.className = 'cart-left';

      // Top bar
      left.innerHTML = `
        <div class="cart-top-bar">
          <div class="cart-select-all" onclick="toggleSelectAll()">
            <div class="cart-checkbox checked" id="selectAllBox"></div>
            <span>Выбрать все</span>
          </div>
          <button class="cart-delete-all" onclick="deleteAll()">
            <i class="ri-delete-bin-6-line"></i> Удалить все
          </button>
        </div>
      `;

      // Mahsulotlar
      cartIds.forEach(id => {
        const item = products.find(p => p.id === id);
        if (!item) return;

        const priceNum = parseInt(item.price.replace(/\D/g, ''));

        const row = document.createElement('div');
        row.className = 'cart-item';
        row.dataset.id = id;
        row.innerHTML = `
          <div class="cart-item__check">
            <div class="cart-checkbox checked item-check" data-id="${id}"></div>
          </div>

          <img class="cart-item__img" src="../../${item.image}" alt="${item.title}"
               onclick="goToObzor(${id})">

          <div class="cart-item__info">
            <div class="cart-item__brand">Бренд</div>
            <div class="cart-item__name" onclick="goToObzor(${id})">${item.title}</div>
            <div class="cart-item__actions">
              <button class="cart-item__action-btn" onclick="addToFavFromCart(${id})">
                <i class="ri-heart-3-line" id="cartFavIcon_${id}"></i>
              </button>
              <button class="cart-item__action-btn" onclick="removeCartItem(${id})">
                <i class="ri-delete-bin-6-line"></i>
              </button>
            </div>
          </div>

          <div class="cart-item__price-block">
            <div class="cart-item__price" id="itemPrice_${id}">${item.price}</div>
            <div class="cart-item__installment">${item.installment}</div>
            <div class="cart-item__qty">
              <button class="qty-btn" onclick="changeQty(${id}, -1)">−</button>
              <span class="qty-num" id="qty_${id}">${quantities[id]}</span>
              <button class="qty-btn" onclick="changeQty(${id}, +1)">+</button>
            </div>
          </div>
        `;
        left.appendChild(row);
      });

      page.appendChild(left);

      // ===== O'NG: HISOB =====
      const right = document.createElement('div');
      right.className = 'cart-right';
      right.id = 'cartRight';
      page.appendChild(right);

      updateSummary();
      restoreFavIcons();
    }

    // ===== HISOB YANGILASH =====
    function updateSummary() {
      const cartIds = JSON.parse(localStorage.getItem('cart')) || [];
      const right   = document.getElementById('cartRight');
      if (!right) return;

      let total = 0;
      cartIds.forEach(id => {
        const item = products.find(p => p.id === id);
        if (!item) return;
        const priceNum = parseInt(item.price.replace(/\D/g, ''));
        total += priceNum * (quantities[id] || 1);
      });

      right.innerHTML = `
        <div class="cart-summary__title">В корзине ${cartIds.length} товара</div>
        <div class="cart-summary__row">
          <span>${cartIds.length} товара на сумму:</span>
          <strong>${total.toLocaleString('ru-RU')} сум</strong>
        </div>
        <div class="cart-summary__row">
          <span>Скидка:</span>
          <strong>0 сум</strong>
        </div>
        <hr class="cart-summary__divider">
        <div class="cart-summary__total">
          <span>Итого:</span>
          <span>${total.toLocaleString('ru-RU')} сум</span>
        </div>
        <button class="cart-order-btn">ОФОРМИТЬ</button>
      `;
    }

    // ===== MIQDOR =====
    // ❌ ESKI
function changeQty(id, delta) {
  if (!quantities[id]) quantities[id] = 1;
  quantities[id] = Math.max(1, quantities[id] + delta);
  
}

// ✅ YANGI — 0 ga yetsa o'chadi
function changeQty(id, delta) {
  if (!quantities[id]) quantities[id] = 1;
  quantities[id] = quantities[id] + delta;

  if (quantities[id] <= 0) {
    removeCartItem(id);
    return;
  }

  const qtyEl   = document.getElementById('qty_' + id);
  const priceEl = document.getElementById('itemPrice_' + id);
  const item    = products.find(p => p.id === id);

  if (qtyEl) qtyEl.textContent = quantities[id];
  if (priceEl && item) {
    const base = parseInt(item.price.replace(/\D/g, ''));
    priceEl.textContent = (base * quantities[id]).toLocaleString('ru-RU') + ' сум';
  }
  updateSummary();
}

    // ===== O'CHIRISH =====
    function removeCartItem(id) {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      cart = cart.filter(i => i !== id);
      localStorage.setItem('cart', JSON.stringify(cart));
      delete quantities[id];
      updateCounts();
      renderCart();
    }

    function deleteAll() {
      localStorage.setItem('cart', JSON.stringify([]));
      Object.keys(quantities).forEach(k => delete quantities[k]);
      updateCounts();
      renderCart();
    }

    // ===== CHECKBOX =====
    function toggleSelectAll() {
      const box = document.getElementById('selectAllBox');
      box.classList.toggle('checked');
      const isChecked = box.classList.contains('checked');
      document.querySelectorAll('.item-check').forEach(c => {
        if (isChecked) c.classList.add('checked');
        else c.classList.remove('checked');
      });
    }

    // ===== YURAKKA QO'SHISH =====
    function addToFavFromCart(id) {
      addToStorage('favorites', id);
      const icon = document.getElementById('cartFavIcon_' + id);
      const favs = JSON.parse(localStorage.getItem('favorites')) || [];
      if (icon) {
        if (favs.includes(id)) {
          icon.classList.replace('ri-heart-3-line', 'ri-heart-3-fill');
          icon.style.color = '#ef4444';
        } else {
          icon.classList.replace('ri-heart-3-fill', 'ri-heart-3-line');
          icon.style.color = '';
        }
      }
      updateCounts();
    }

    function restoreFavIcons() {
      const favs = JSON.parse(localStorage.getItem('favorites')) || [];
      const cartIds = JSON.parse(localStorage.getItem('cart')) || [];
      cartIds.forEach(id => {
        const icon = document.getElementById('cartFavIcon_' + id);
        if (icon && favs.includes(id)) {
          icon.classList.replace('ri-heart-3-line', 'ri-heart-3-fill');
          icon.style.color = '#ef4444';
        }
      });
    }

    function goToObzor(id) {
      window.location.href = "./src/html/obzor.html?id=" + id;
    }

    window.addEventListener('load', () => {
      renderCart();
    });
  </script>
</body>
</html>
